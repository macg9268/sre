global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ["prometheus:9090"] # Prometheus monitors itself

  - job_name: "fastapi-app"
    static_configs:
      - targets: ["api_python:8000"]

  - job_name: 'jenkins'
    static_configs:
      - targets: ["jenkins-server:8080"]
  
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
  
rule_files:
  - "alerts.yml"