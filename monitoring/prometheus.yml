global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api_python"
    static_configs:
      - targets: ["api_python:8000"]
 
  - job_name: "api_python_ubuntu"
    static_configs:
      - targets: ["ubuntusrv01:8000"]

  - job_name: 'jenkins'
    metrics_path: /prometheus
    static_configs:
      - targets: ['jenkins:8080']

rule_files:
  - "alerts.yml"